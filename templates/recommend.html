<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: black;">

    <nav class="navbar" style="background-color: #00a65a; padding:10px;">
        <a class="navbar-brand" href="/" style="color:white; font-weight:bold;">
            My Book Recommender
        </a>

        <ul class="nav navbar-nav" style="display:flex; gap:20px; list-style:none; margin-left:20px;">
            <li><a href="/" style="color:white;">Home</a></li>
            <li><a href="/recommend" style="color:white;">Recommend</a></li>
            <li><a href="#" style="color:white;">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="row">

            <div class="col-12" style="margin-top:20px;">
                <h1 style="color:white;">Recommend Books</h1>
                <form action="/recommend_books" method="post">
                    <input name="user_input" type="text" class="form-control form-control-lg"><br>
                    <input type="submit" class="btn btn-lg btn-warning">
                </form>
            </div>
            {% if data %}
             {%for i in data%}
            <div class="col-md-3" style="margin-top:50px;">
                <div class="card" style="background-color:#1c1c1c; color:white;">
                    <div class="card-body">

                        <img src="{{i[2]}}" class="card-img-top"
                            style="height:250px;">

                        <p>{{i[0]}}</p>
                        <p>{{i[1]}}</p>

                    </div>
                </div>
            </div>
            {%endfor%}
            {% endif %}

        </div>
    </div>

</body>

</html>
